<!DOCTYPE html>
<html lang="en">
<head>
  <title>Reflexes</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>  

  </head>
<body>

  <h2>Nikesh Reflexes</h2>
  <div id="target" class="primary">Your Time</div>
  <div id="counter" class="danger">Count</div>
  <button type="button" class="btn btn-primary" onclick="beginTime()"> Go</button>
  <button type="button" class="btn btn-secondary" onclick="recordTime()">
  Halt</button>
  
  <script> 
    var haltTime = undefined;
  function recordTime() {
    haltTime = new Date();
    console.log(haltTime);
  }

  function beginTime() {
  haltTime = undefined;

  const countdownSeconds = Math.floor(Math.random() * 7) + 2;
  let current = countdownSeconds;

  for (let i = 0; i < current; i++) {
    setTimeout(() => {
      document.getElementById('counter').innerText = i;
    }, (current - i) * 1000);
  }

  setTimeout(() => {
    const target = document.getElementById('target');

    if (haltTime === undefined) {
      target.innerText = "Not Soon Enough!";
    } else {
      const targetTime = Date.now();
      const elapsedTime = targetTime - haltTime.getTime();
      target.innerText = "Time was " + elapsedTime;
    }
  }, (countdownSeconds + 1) * 1000);
}
</script>

</body>
</html>
