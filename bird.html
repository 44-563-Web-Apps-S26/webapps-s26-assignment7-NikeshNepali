<!doctype html>
<html lang="en">
  <head>
    <title>Bird Page</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <style>
    .grid-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      cursor: pointer;
    }
    .grid-row {
      margin-bottom: 5px;
    }
  </style>
  </head>
  <body>
    <div class="container-fluid bg-success bg-opacity-25">
      <h1 class="mb-3 text-primary">Nikesh Bird Hunt</h1>
      <p class="fs-2 text-alert">
        Click on the locations to find the birds, watch out for the forbidden
        statue
      </p>
      <p id="locations" class="fs 1 text-success">
        Number of locations checked is zero
      </p>
      <p id="score" class="fs2 text-alert">Score is zero.</p>
      <p class="fs2 btn btn-warning" onclick="help()">Click for help.</p>
      <p id="help" class="fs2 text-primary">Help report</p>
    </div>

    <div class="container">
  <!-- 5 rows -->
  <div class="row grid-row">
    <div class="col"><img src="bush.jpg" id="one" class="grid-img" onclick="check(0)"></div>
    <div class="col"><img src="bush.jpg" id="two" class="grid-img" onclick="check(1)"></div>
    <div class="col"><img src="bush.jpg" id="three" class="grid-img" onclick="check(2)"></div>
    <div class="col"><img src="bush.jpg" id="four" class="grid-img" onclick="check(3)"></div>
    <div class="col"><img src="bush.jpg" id="five" class="grid-img" onclick="check(4)"></div>
    <div class="col"><img src="bush.jpg" id="six" class="grid-img" onclick="check(5)"></div>
    <div class="col"><img src="bush.jpg" id="seven" class="grid-img" onclick="check(6)"></div>
  </div>

  <div class="row grid-row">
    <div class="col"><img src="bush.jpg" id="eight" class="grid-img" onclick="check(7)"></div>
    <div class="col"><img src="bush.jpg" id="nine" class="grid-img" onclick="check(8)"></div>
    <div class="col"><img src="bush.jpg" id="ten" class="grid-img" onclick="check(9)"></div>
    <div class="col"><img src="bush.jpg" id="eleven" class="grid-img" onclick="check(10)"></div>
    <div class="col"><img src="bush.jpg" id="twelve" class="grid-img" onclick="check(11)"></div>
    <div class="col"><img src="bush.jpg" id="thirteen" class="grid-img" onclick="check(12)"></div>
    <div class="col"><img src="bush.jpg" id="fourteen" class="grid-img" onclick="check(13)"></div>
  </div>

  <div class="row grid-row">
    <div class="col"><img src="bush.jpg" id="fifteen" class="grid-img" onclick="check(14)"></div>
    <div class="col"><img src="bush.jpg" id="sixteen" class="grid-img" onclick="check(15)"></div>
    <div class="col"><img src="bush.jpg" id="seventeen" class="grid-img" onclick="check(16)"></div>
    <div class="col"><img src="bush.jpg" id="eighteen" class="grid-img" onclick="check(17)"></div>
    <div class="col"><img src="bush.jpg" id="nineteen" class="grid-img" onclick="check(18)"></div>
    <div class="col"><img src="bush.jpg" id="twenty" class="grid-img" onclick="check(19)"></div>
    <div class="col"><img src="bush.jpg" id="twenty-one" class="grid-img" onclick="check(20)"></div>
  </div>

  <div class="row grid-row">
    <div class="col"><img src="bush.jpg" id="twenty-two" class="grid-img" onclick="check(21)"></div>
    <div class="col"><img src="bush.jpg" id="twenty-three" class="grid-img" onclick="check(22)"></div>
    <div class="col"><img src="bush.jpg" id="twenty-four" class="grid-img" onclick="check(23)"></div>
    <div class="col"><img src="bush.jpg" id="twenty-five" class="grid-img" onclick="check(24)"></div>
    <div class="col"><img src="bush.jpg" id="twenty-six" class="grid-img" onclick="check(25)"></div>
    <div class="col"><img src="bush.jpg" id="twenty-seven" class="grid-img" onclick="check(26)"></div>
    <div class="col"><img src="bush.jpg" id="twenty-eight" class="grid-img" onclick="check(27)"></div>
  </div>

  <div class="row grid-row">
    <div class="col"><img src="bush.jpg" id="twenty-nine" class="grid-img" onclick="check(28)"></div>
    <div class="col"><img src="bush.jpg" id="thirty" class="grid-img" onclick="check(29)"></div>
    <div class="col"><img src="bush.jpg" id="thirty-one" class="grid-img" onclick="check(30)"></div>
    <div class="col"><img src="bush.jpg" id="thirty-two" class="grid-img" onclick="check(31)"></div>
    <div class="col"><img src="bush.jpg" id="thirty-three" class="grid-img" onclick="check(32)"></div>
    <div class="col"><img src="bush.jpg" id="thirty-four" class="grid-img" onclick="check(33)"></div>
    <div class="col"><img src="bush.jpg" id="thirty-five" class="grid-img" onclick="check(34)"></div>
  </div>
</div>
  </body>
</html>
<script>
  var ids = ["one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve",
    "thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty","twenty-one",
    "twenty-two","twenty-three","twenty-four","twenty-five","twenty-six","twenty-seven","twenty-eight","twenty-nine",
    "thirty","thirty-one","thirty-two","thirty-three","thirty-four","thirty-five",
  ];

  var score = 0;
  var locationsVisited = 0;
  var lastLocation = 0;
  const statueLocation = 19;
  const toucanLocation = 14;
  const lorikeetLocation = [3, 25];
  const buntingLocation = [2, 5, 11, 20, 21];
  var gameOver = false;

  function check(position) {
    if (gameOver) {
      return;
    }

    id = document.getElementById(ids[position]);
    if (buntingLocation.includes(position)) {
      id.src = "bunting.jpg";
      id.innerHTML = "bunting";
      id.onclick = null;
      score += 1;
    } else if (lorikeetLocation.includes(position)) {
      id.src = "lorikeet.jpg";
      id.onclick = null;
      id.innerHTML = "lorikeet";
      score += 3;
    } else if (position == toucanLocation) {
      id.src = "toucan.jpg";
      id.onclick = null;
      id.innerHTML = "toucan";
      score += 5;
    } else if( position == statueLocation){
      id.src = "statue.jpg";
      id.onclick = null;
      id.innerHTML = "statue";
      gameOver = true;
      score -= 3;
    }
    locationsVisited++;
    lastLocation = position;
    document.getElementById("score").innerHTML = "Score is " + score;
    document.getElementById("locations").innerHTML =
      "Number of locations checked is " + (locationsVisited);
  }

  function help() {
    result = "silence"
    row = Math.floor(lastLocation / 7);
    col = lastLocation % 7;

    right = (lastLocation + 1) % 34;
    left = (lastLocation - 1 + 34) % 34;
    up = (lastLocation - 7 + 34) % 34;
    down = (lastLocation + 7) % 34;
    if( buntingLocation.includes(right) || buntingLocation.includes(left) 
    || buntingLocation.includes(up) || buntingLocation.includes(down)){
        result = "Cheep";
    }

    neighbours = [];
    for( let r = -1; r <= 1; r++){
        for( let c = -1; c <= 1; c++){
            if( r == 0 && c == 0){
                continue;
            }
            neighbours.push(((row + r) * 7 + (col + c)) % 34);
        }
    }
    if(neighbours.includes(toucanLocation)){
        result = "caw";
    }else if(neighbours.includes(statueLocation)){
        result = "thrum";
    }
    document.getElementById("help").innerHTML = result;
  }
</script>
